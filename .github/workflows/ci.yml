name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short --cov=dsafelogger --cov-report=xml:coverage.xml --cov-report=term-missing

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  free-threaded-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13t", "3.14t"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev --python ${{ matrix.python-version }}

      - name: Run free-threaded tests
        env:
          PYTHON_GIL: "0"
        run: uv run --python ${{ matrix.python-version }} pytest tests/ -v --tb=short

  publication-checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --group dev

      - name: Record pyright version
        run: uv run pyright --version

      - name: Run mypy
        run: uv run mypy src

      - name: Run pyright
        run: uv run pyright src

      - name: Check typing smoke test
        run: uv run pyright tests/typing_smoke

      - name: Check release identity
        run: uv run python scripts/check_release_identity.py

      - name: Check documented release facts
        run: uv run python scripts/check_release_facts.py

      - name: Check API docs
        run: uv run python scripts/generate_api_docs.py --check

      - name: Check public design docs
        run: uv run python scripts/check_design_docs_sync.py

      - name: Check benchmark summaries
        run: uv run python benchmarks/update_summary.py --check

      - name: Clean dist
        run: rm -rf dist

      - name: Build package
        run: uv build

      - name: Check distribution contents
        run: uv run python scripts/check_distribution_contents.py

      - name: Install built wheel for verifytypes
        run: uv run python scripts/install_built_wheel.py

      - name: Check type completeness
        run: uv run --no-sync python scripts/check_type_completeness.py --min-score 100

      - name: Restore editable install
        if: always()
        run: uv sync --reinstall --group dev
