name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --group dev

      - name: Check release tag matches package version
        run: |
          uv run python - <<'PY'
          import os
          import sys
          import tomllib
          from pathlib import Path

          tag = os.environ.get('GITHUB_REF_NAME', '')
          version = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))['project']['version']
          sys.path.insert(0, 'src')
          import dsafelogger

          expected = f'v{version}'
          if tag != expected:
              raise SystemExit(f'tag {tag!r} does not match {expected!r}')
          if dsafelogger.__version__ != version:
              raise SystemExit(
                  f'__version__ {dsafelogger.__version__!r} does not match pyproject {version!r}'
              )
          print(f'release version verified: {version}')
          PY

      - name: Check API docs
        run: uv run python scripts/generate_api_docs.py --check

      - name: Check public design docs
        run: uv run python scripts/check_design_docs_sync.py

      - name: Check benchmark summaries
        run: uv run python benchmarks/update_summary.py --check

      - name: Run tests
        run: uv run pytest tests -q

      - name: Build package
        run: uv build

      - name: Validate distribution contents
        run: uv run python scripts/check_distribution_contents.py

      - name: Check package metadata
        run: uvx twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
