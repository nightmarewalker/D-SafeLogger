name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --group dev

      - name: Check release tag matches package version
        run: uv run python scripts/check_release_identity.py

      - name: Check documented release facts
        run: uv run python scripts/check_release_facts.py

      - name: Check API docs
        run: uv run python scripts/generate_api_docs.py --check

      - name: Check public design docs
        run: uv run python scripts/check_design_docs_sync.py

      - name: Check benchmark summaries
        run: uv run python benchmarks/update_summary.py --check

      - name: Run tests
        run: uv run pytest tests -q

      - name: Build package
        run: uv build

      - name: Validate distribution contents
        run: uv run python scripts/check_distribution_contents.py

      - name: Check package metadata
        run: uvx twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
