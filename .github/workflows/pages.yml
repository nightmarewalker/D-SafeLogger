name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "README.md"
      - "README_ja.md"
      - "BENCHMARK.md"
      - "pyproject.toml"
      - "examples/12_multiprocess_logging.md"
      - "scripts/generate_pages_site.py"
      - ".github/workflows/pages.yml"
  pull_request:
    paths:
      - "README.md"
      - "README_ja.md"
      - "BENCHMARK.md"
      - "pyproject.toml"
      - "examples/12_multiprocess_logging.md"
      - "scripts/generate_pages_site.py"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Generate Pages site
        run: python scripts/generate_pages_site.py --output site

      - name: Validate generated Pages site
        run: python scripts/generate_pages_site.py --check-dir site

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
