name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --group dev

      - name: Check release tag matches package version
        run: |
          uv run python - <<'PY'
          import os
          import sys
          import tomllib
          from pathlib import Path

          tag = os.environ.get('GITHUB_REF_NAME', '')
          version = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))['project']['version']
          sys.path.insert(0, 'src')
          import dsafelogger

          expected = f'v{version}'
          if tag != expected:
              raise SystemExit(f'tag {tag!r} does not match {expected!r}')
          if dsafelogger.__version__ != version:
              raise SystemExit(
                  f'__version__ {dsafelogger.__version__!r} does not match pyproject {version!r}'
              )
          print(f'release version verified: {version}')
          PY

      - name: Check API docs
        run: uv run python scripts/generate_api_docs.py --check

      - name: Check public design docs
        run: uv run python scripts/check_design_docs_sync.py

      - name: Check benchmark summaries
        run: uv run python benchmarks/update_summary.py --check

      - name: Run tests
        run: uv run pytest tests -q

      - name: Build package
        run: uv build

      - name: Validate distribution contents
        run: |
          uv run python - <<'PY'
          import tarfile
          import zipfile
          from pathlib import Path

          dist = Path('dist')
          wheels = sorted(dist.glob('*.whl'))
          sdists = sorted(dist.glob('*.tar.gz'))
          if len(wheels) != 1:
              raise SystemExit(f'expected exactly one wheel, found {len(wheels)}')
          if len(sdists) != 1:
              raise SystemExit(f'expected exactly one sdist, found {len(sdists)}')

          def normalized_sdist_names(path):
              with tarfile.open(path, 'r:gz') as archive:
                  names = []
                  for member in archive.getmembers():
                      parts = Path(member.name).parts
                      if len(parts) > 1:
                          names.append('/'.join(parts[1:]))
                  return set(names)

          with zipfile.ZipFile(wheels[0]) as archive:
              wheel_names = set(archive.namelist())
          sdist_names = normalized_sdist_names(sdists[0])

          wheel_forbidden = (
              'tests/',
              'docs/',
              'examples/',
              'benchmarks/',
              'plan/',
              'for_chat/',
              '.github/',
              'dist/',
          )
          sdist_forbidden = (
              'plan/',
              'for_chat/',
              '.git/',
              '.github/',
              'docs/design/old/',
              'dist/',
              'build/',
          )
          sdist_required = {
              'LICENSE',
              'README.md',
              'README_ja.md',
              'CHANGELOG.md',
              'TESTING.md',
              'BENCHMARK.md',
              'CONTRIBUTING.md',
              'SECURITY.md',
              'MANIFEST.in',
              'pyproject.toml',
              'src/dsafelogger/__init__.py',
              'tests/conftest.py',
              'docs/design/D_SafeLogger_Specification_v23j_full.md',
              'docs/design/D_SafeLogger_Specification_v23j_full_en.md',
              'docs/design/D-SafeLogger_DetailedDesign_v23j.md',
              'docs/design/D-SafeLogger_TestDesign_v23j.md',
              'docs/design/D-SafeLogger_v23j_WhitePaper.md',
              'docs/design/D-SafeLogger_v23j_WhitePaper_en.md',
              'examples/01_quick_start.md',
              'examples/17_container_collector_coexistence.md',
              'benchmarks/_benchmark_report.py',
              'benchmarks/update_summary.py',
              'benchmarks/summary/index.md',
              'benchmarks/summary/manifest.json',
              'benchmarks/results/benchmark_20260506_180018/summary.json',
              'benchmarks/results/benchmark_20260506_180018/summary.md',
              'benchmarks/results/benchmarks_multi_integ_20260506_185947/summary.json',
              'benchmarks/results/benchmarks_multi_integ_20260506_185947/summary.md',
              'benchmarks/results/benchmarks_multi_perf_20260506_190518/summary.json',
              'benchmarks/results/benchmarks_multi_perf_20260506_190518/summary.md',
              'benchmarks/results/benchmarks_multi_resilience_20260506_211129/summary.json',
              'benchmarks/results/benchmarks_multi_resilience_20260506_211129/summary.md',
          }

          bad_wheel = sorted(
              name for name in wheel_names if name.startswith(wheel_forbidden)
          )
          if bad_wheel:
              raise SystemExit(f'wheel contains forbidden paths: {bad_wheel[:20]}')

          bad_sdist = sorted(
              name for name in sdist_names if name.startswith(sdist_forbidden)
          )
          if bad_sdist:
              raise SystemExit(f'sdist contains forbidden paths: {bad_sdist[:20]}')

          missing = sorted(sdist_required - sdist_names)
          if missing:
              raise SystemExit(f'sdist is missing required paths: {missing}')

          print('distribution contents verified')
          PY

      - name: Check package metadata
        run: uvx twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
